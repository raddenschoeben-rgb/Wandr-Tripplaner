kind = "web"
previewPath = "/"
title = "Travel Planner"
version = "1.0.0"
id = "artifacts/travel-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24289

[services.development]
run = "pnpm --filter @workspace/travel-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-planner", "run", "build" ]
publicDir = "artifacts/travel-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24289"
BASE_PATH = "/"
